<script>
document.addEventListener('DOMContentLoaded', () => {
  const aboutUrl = "{{ '/about/' | relative_url }}";

  const redirectToAbout = (event) => {
    event.preventDefault();
    event.stopPropagation();
    window.location.href = aboutUrl;
  };

  const configureAboutLink = (element) => {
    if (!element) return;
    
    // Find the actual anchor element
    const anchor = element.tagName === 'A' ? element : (element.querySelector('a') || element);
    
    // Set the URL
    anchor.setAttribute('href', aboutUrl);
    anchor.style.cursor = 'pointer';

    // Remove old listeners to prevent duplication
    anchor.removeEventListener('click', redirectToAbout, true);
    
    // Add the "Capture" listener (the key to the fix)
    anchor.addEventListener('click', redirectToAbout, true);
  };

  const runFix = () => {
    const selectors = [
      '#avatar', 
      '#sidebar .site-title', 
      '#site-title', 
      '.site-title'
    ];
    
    selectors.forEach(sel => {
      const el = document.querySelector(sel);
      if (el) configureAboutLink(el);
    });
  };

  // Initial run
  runFix();

  // Chirpy re-renders elements on mobile/dynamic load, so run this periodically
  setInterval(runFix, 500); 
});
</script>

{% if page.layout == 'post' %}
<style>
  /* --- PROGRESS BAR BASE STYLING --- */
  #reading-progress-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px; 
    z-index: 999999 !important; 
    pointer-events: none; 
    background-color: transparent;
  }

  /* Progress bar hardcoded to Academic Purple */
  #reading-progress-bar {
    width: 0%;
    height: 100%;
    transition: width 0.1s ease-out;
    background-color: #4f8fd8 !important; 
    box-shadow: 0 0 8px #4f8fd8;
  }
</style>

<script>
  /* --- PROGRESS BAR ENGINE --- */
  document.addEventListener('DOMContentLoaded', () => {
    if (document.getElementById('reading-progress-container')) return;

    const container = document.createElement('div');
    container.id = 'reading-progress-container';

    const bar = document.createElement('div');
    bar.id = 'reading-progress-bar';

    container.appendChild(bar);
    document.body.appendChild(container);

    const calculateProgress = () => {
      const scrollTop = window.scrollY || document.documentElement.scrollTop;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      
      if (docHeight > 0) {
        const scrollPercent = (scrollTop / docHeight) * 100;
        bar.style.width = `${Math.min(scrollPercent, 100)}%`;
      }
    };

    window.addEventListener('scroll', calculateProgress, { passive: true });
    window.addEventListener('resize', calculateProgress, { passive: true });
    
    calculateProgress();
  });
</script>
{% endif %}
