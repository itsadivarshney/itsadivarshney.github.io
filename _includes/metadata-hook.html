<script>
  document.addEventListener('DOMContentLoaded', () => {
    // Generates the correct absolute path to your About page 
    const aboutUrl = "{{ '/about/' | relative_url }}";
    
    // 1. Sidebar Elements (Desktop View & Opened Mobile Menu)
    const avatarLink = document.getElementById('avatar');
    // Grabs the <a> inside the site-title class, or the class itself as a fallback
    const sidebarTitleLink = document.querySelector('.site-title a') || document.querySelector('.site-title');
    
    // 2. Topbar Element (Mobile Sticky Header)
    const mobileTopbarTitle = document.getElementById('site-title');
    
    // Update the Sidebar targets seamlessly
    if (avatarLink) avatarLink.href = aboutUrl;
    if (sidebarTitleLink) sidebarTitleLink.href = aboutUrl;
    
    // Update the Mobile Topbar target
    if (mobileTopbarTitle) {
      if (mobileTopbarTitle.tagName === 'A') {
        // If it is a standard link, simply update the destination
        mobileTopbarTitle.href = aboutUrl;
      } else {
        // If Chirpy rendered it as a <span>, we can easily force it to act like a link!
        mobileTopbarTitle.style.cursor = 'pointer';
        mobileTopbarTitle.addEventListener('click', () => {
          window.location.href = aboutUrl;
        });
      }
    }
  });
</script>

<style>
  /* --- PROGRESS BAR BASE STYLING --- */
  #reading-progress-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 4px; 
    z-index: 999999 !important; 
    pointer-events: none; 
    background-color: transparent;
  }

  #reading-progress-bar {
    width: 0%;
    height: 100%;
    transition: width 0.1s ease-out;
  }

  /* --- LIGHT MODE ONLY COLOR (Purple) --- */
  html:not([data-mode="dark"]) #reading-progress-bar {
    background-color: #7D3F98 !important; 
    box-shadow: 0 0 8px rgba(125, 63, 152, 0.6);
  }

  /* --- DARK MODE ONLY COLOR (Academic Gold) --- */
  html[data-mode="dark"] #reading-progress-bar {
    background-color: #C5A059 !important;
    box-shadow: 0 0 8px rgba(197, 160, 89, 0.6);
  }
</style>

<script>
  /* --- PROGRESS BAR ENGINE --- */
  document.addEventListener('DOMContentLoaded', () => {
    if (document.getElementById('reading-progress-container')) return;

    const container = document.createElement('div');
    container.id = 'reading-progress-container';

    const bar = document.createElement('div');
    bar.id = 'reading-progress-bar';

    container.appendChild(bar);
    document.body.appendChild(container);

    const calculateProgress = () => {
      const scrollTop = window.scrollY || document.documentElement.scrollTop;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      
      if (docHeight > 0) {
        const scrollPercent = (scrollTop / docHeight) * 100;
        bar.style.width = `${Math.min(scrollPercent, 100)}%`;
      }
    };

    window.addEventListener('scroll', calculateProgress, { passive: true });
    window.addEventListener('resize', calculateProgress, { passive: true });
    
    calculateProgress();
  });
</script>
{% endif %}
